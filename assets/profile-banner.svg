<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">manualonlock</title>
  <desc id="desc">manualonlock profile banner</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#111b35"/>
      <stop offset="1" stop-color="#092b32"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#94a3b8" stroke-opacity=".08"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="24" fill="url(#grid)"/>
  <circle cx="1040" cy="50" r="160" fill="#22d3ee" opacity=".08" filter="url(#glow)"/>
  <circle cx="110" cy="310" r="190" fill="#818cf8" opacity=".08" filter="url(#glow)"/>

  <g transform="translate(70 64)">
    <rect width="72" height="72" rx="18" fill="#0f172a" stroke="#5eead4" stroke-opacity=".55"/>
    <path d="M22 26 34 36 22 46M39 47h14" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="0" y="132" fill="#f8fafc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="54" font-weight="700" letter-spacing="-2">
      manualonlock
    </text>
    <rect x="0" y="151" width="530" height="4" rx="2" fill="url(#accent)"/>
  </g>

</svg>
